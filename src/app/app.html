<div
  #rendererContainer
  class="size-full touch-none"
  [class.cursor-grab]="canPan() && !isPanning()"
  [class.cursor-grabbing]="isPanning()"
  (pointerdown)="onPanStart($event)"
  (pointermove)="onPanMove($event)"
  (pointerup)="onPanEnd($event)"
  (pointercancel)="onPanEnd($event)"
></div>
<button
  mat-icon-button
  class="!absolute top-0 left-0"
  (click)="openSettingsDialog()"
>
  <mat-icon>settings</mat-icon>
</button>
@if (isPanned()) {
  <button
    mat-icon-button
    class="!absolute top-0 right-0"
    aria-label="Move the device back to the centre"
    (click)="recenter()"
  >
    <mat-icon>filter_center_focus</mat-icon>
  </button>
}
@if (isCalibrated()) {
  <div
    class="!absolute bottom-4 left-1/2 -translate-x-1/2 rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300 ring-1 ring-white/10"
  >
    Actual size &middot; {{ ppiDisplay() }} px/inch
    @if (canPan()) {
      &middot; drag to see the rest
    }
  </div>
} @else {
  <div
    class="!absolute bottom-4 left-1/2 flex max-w-[92vw] -translate-x-1/2 flex-wrap items-center justify-center gap-x-3 gap-y-2 rounded-2xl bg-amber-500/15 px-4 py-2 text-sm text-amber-100 ring-1 ring-amber-400/40"
  >
    <span class="flex items-center gap-2">
      <mat-icon class="!h-5 !w-5 !text-[20px] text-amber-300">straighten</mat-icon>
      Not calibrated &mdash; this is not shown at actual size yet.
    </span>
    <button mat-flat-button (click)="openSettingsDialog()">Calibrate</button>
  </div>
}
