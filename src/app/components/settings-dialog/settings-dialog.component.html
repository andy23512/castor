<mat-dialog-content>
  <div>
    Logical Resolution:
    <mat-form-field appearance="outline" class="!w-32 compact-form-field">
      <input
        matInput
        type="number"
        [ngModel]="logicalResolutionWidth()"
        (ngModelChange)="setScreenSetting('logicalResolutionWidth', $event)"
      />
    </mat-form-field>
    X
    <mat-form-field appearance="outline" class="!w-32 compact-form-field">
      <input
        matInput
        type="number"
        [ngModel]="logicalResolutionHeight()"
        (ngModelChange)="setScreenSetting('logicalResolutionHeight', $event)"
      />
    </mat-form-field>
  </div>
  <div>
    Screen Size (inches):
    <mat-form-field appearance="outline" class="!w-32 compact-form-field">
      <input
        matInput
        type="number"
        [ngModel]="screenSizeInInches()"
        (ngModelChange)="setScreenSetting('screenSizeInInches', $event)"
      />
    </mat-form-field>
  </div>
  <div>
    Zoom Percentage:
    <mat-form-field appearance="outline" class="!w-32 compact-form-field">
      <input
        matInput
        type="number"
        [ngModel]="zoomPercentage()"
        (ngModelChange)="setScreenSetting('zoomPercentage', $event)"
      />
    </mat-form-field>
  </div>
  <div>
    Logical Pixel Per Inch:
    <math class="text-xl">
      <mfrac>
        <msqrt>
          <msup>
            <mi>{{ logicalResolutionWidth() }}</mi>
            <ms>2</ms>
          </msup>
          <mo>+</mo>
          <msup>
            <mi>{{ logicalResolutionHeight() }}</mi>
            <ms>2</ms>
          </msup>
        </msqrt>
        <mrow>
          <mi>{{ screenSizeInInches() }}</mi>
          <mo>&times;</mo>
          <mi>{{ zoomPercentage() }}</mi>
          <mo>%</mo>
        </mrow>
      </mfrac>
      <mo>=</mo>
      <mi>{{ ppi() }}</mi>
    </math>
  </div>
  <div class="mt-2">
    <div #inchRuler class="h-[30px]"></div>
    <div #cmRuler class="h-[30px]"></div>
  </div>
  <div
    class="mt-2 bg-amber-500/50 flex items-center justify-center text-white"
    [style.width.px]="creditCardWidth()"
    [style.height.px]="creditCardHeight()"
    [style.border-radius.px]="creditCardBorderRadius()"
  >
    Credit Card
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
